<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans p-6">
    <header class="mb-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold">Vanguard</h1>
        <div id="status-badge" class="px-3 py-1 bg-gray-300 rounded">Disconnected</div>
    </header>

    <div class="flex gap-6">
        <div class="flex-1">
            <div class="mb-4">
                <button onclick="startAgent()" class="bg-blue-600 text-white px-4 py-2 rounded">Start Agent</button>
            </div>
            <table class="w-full bg-white rounded shadow p-4">
                <thead>
                    <tr class="text-left border-b">
                        <th class="p-2">Task ID</th>
                        <th class="p-2">Type</th>
                        <th class="p-2">Status</th>
                    </tr>
                </thead>
                <tbody id="task-list"></tbody>
            </table>
            <!-- HITL Panel -->
            <div id="hitl-panel" class="mt-6 bg-white p-4 rounded shadow hidden">
                <h3 class="font-bold mb-2">Human Interaction Required</h3>
                <input type="text" id="hitl-input" class="border p-2 w-full mb-2" placeholder="Provide input...">
                <button onclick="sendHitlInput()" class="bg-green-600 text-white px-4 py-2 rounded">Submit</button>
            </div>
        </div>
        <div class="w-1/3">
            <div class="bg-gray-800 text-white p-2 mb-2 rounded text-sm">Preview</div>
            <img id="browser-screenshot" class="w-full h-64 bg-gray-200 mb-4 object-contain border" src="" alt="Browser Preview">
            <div class="bg-black text-green-400 p-4 h-64 overflow-y-scroll text-xs" id="log-panel"></div>
        </div>
    </div>

    <script>
        // Retrieve JWT token from cookie or local storage (simplified for demo)
        const token = document.cookie.replace(/(?:(?:^|.*;\s*)access_token\s*\=\s*([^;]*).*$)|^.*$/, "$1");
        
        // Decode JWT to get user_id (sub claim)
        function getUserIdFromToken(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload).sub;
            } catch (e) {
                return null;
            }
        }
        
        const userId = getUserIdFromToken(token);
        const ws = new WebSocket(`ws://${window.location.host}/agent/ws/${userId}?token=${token}`);
        
        ws.onopen = () => document.getElementById('status-badge').innerText = 'Connected';
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const log = document.getElementById('log-panel');
            log.innerHTML += `<div>${data.message || event.data}</div>`;
            
            if (data.screenshot) {
                document.getElementById('browser-screenshot').src = `data:image/png;base64,${data.screenshot}`;
            }
            
            if (data.require_input) {
                document.getElementById('hitl-panel').classList.remove('hidden');
            }
        };

        function sendHitlInput() {
            const input = document.getElementById('hitl-input').value;
            ws.send(JSON.stringify({ type: 'hitl_input', content: input }));
            document.getElementById('hitl-panel').classList.add('hidden');
        }
    </script>
</body>
</html>
