<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans p-6">
    <header class="mb-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold">Vanguard</h1>
        <div id="status-badge" class="px-3 py-1 bg-gray-300 rounded">Disconnected</div>
    </header>

    <div class="flex gap-6">
        <div class="flex-1">
            <div class="mb-4">
                <button onclick="startAgent()" class="bg-blue-600 text-white px-4 py-2 rounded">Start Agent</button>
            </div>
            <table class="w-full bg-white rounded shadow p-4">
                <thead>
                    <tr class="text-left border-b">
                        <th class="p-2">Task ID</th>
                        <th class="p-2">Type</th>
                        <th class="p-2">Status</th>
                    </tr>
                </thead>
                <tbody id="task-list"></tbody>
            </table>
        </div>
        <div class="w-1/3">
            <div class="bg-black text-green-400 p-4 h-96 overflow-y-scroll" id="log-panel"></div>
        </div>
    </div>

    <script>
        // Retrieve JWT token from cookie or local storage (simplified for demo)
        const token = document.cookie.replace(/(?:(?:^|.*;\s*)access_token\s*\=\s*([^;]*).*$)|^.*$/, "$1");
        const ws = new WebSocket(`ws://${window.location.host}/agent/ws/user1?token=${token}`);
        
        ws.onopen = () => document.getElementById('status-badge').innerText = 'Connected';
        ws.onmessage = (event) => {
            const log = document.getElementById('log-panel');
            log.innerHTML += `<div>${event.data}</div>`;
        };

        function startAgent() {
            fetch('/agent/scrape', { method: 'POST' });
        }
    </script>
</body>
</html>
