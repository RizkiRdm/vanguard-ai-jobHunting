<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard | AI Job Hunting Copilot</title>
    <!-- Tailwind CSS CDN (Low-spec friendly, no build step needed) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- HTMX CDN -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
        integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
        crossorigin="anonymous"></script>
    <style>
        .htmx-indicator {
            display: none;
        }

        .htmx-request .htmx-indicator {
            display: block;
        }

        .htmx-request.htmx-indicator {
            display: block;
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <!-- Navigation Shell -->
    {% include 'components/navbar.html' %}
    <div class="flex flex-1 w-full max-w-7xl mx-auto overflow-hidden">

        <!-- Sidebar: Tetap di kiri, jangan sampai kegulung -->
        <div class="flex-none">
            {% include 'components/sidebar.html' %}
        </div>

        <!-- Area Konten Dinamis: Kasih overflow-y-auto supaya bisa scroll sendiri -->
        <main id="main-content" class="flex-1 overflow-y-auto px-6 py-8">
            {% block content %}
            <!-- Default content placeholder -->
            <div class="p-8 text-center border-2 border-dashed border-slate-800 rounded-2xl">
                <h1 class="text-3xl font-bold mb-4 text-slate-600">No Content Deployed.</h1>
                <p class="text-slate-500 text-sm">Select a module from the sidebar or navbar to begin operations.</p>
            </div>
            {% endblock %}
        </main>
    </div>

    <!-- Global Loader for HTMX Requests -->
    <div id="global-loader"
        class="htmx-indicator fixed bottom-5 right-5 bg-blue-600 px-4 py-2 rounded-full shadow-lg flex items-center space-x-2 z-[9999]">
        <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>
        <span class="text-sm font-medium">Processing...</span>
    </div>



</body>

</html>
